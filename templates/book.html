<!DOCTYPE html>
<html>
<head>
<title>Book Appointment - {{ tenant.name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #FF2D6B;
  --border: rgba(255,45,107,0.15);
  --radius: 20px;
}
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 18px 60px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-weight: 800;
  font-size: 1.4rem;
  text-decoration: none;
  color: var(--dark);
}
.logo span { color: var(--pink); }


body {
  font-family: 'DM Sans', sans-serif;
  background: #fff;
  padding: 120px 20px;
}

.card {
  max-width: 600px;
  margin: auto;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
}

h1 { font-family: 'Syne', sans-serif; }

input, select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 50px;
  border: none;
  background: var(--pink);
  color: white;
  font-weight: 700;
}
.back-btn {
  text-decoration: none;
  padding: 10px 22px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  color: var(--pink);
  font-weight: 600;
  transition: 0.3s;
}

.back-btn:hover {
  background: var(--pink-light);
}
</style>
</head>
<body>
  <div class="topbar">
  <a href="{{ url_for('home') }}" class="logo">⚡ Q<span>Smart</span></a>
  
  <a href="{{ url_for('home') }}" class="back-btn">← Back to Home</a>
</div>
</div>
<div class="card">
<h1>📅 Book Appointment</h1>
<h2>{{ tenant.name }}</h2>

<form method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone" required>

<select name="service_id" required>
<option value="">Select service</option>
{% for service in services %}
<option value="{{ service.id }}">{{ service.name }} - ₹{{ service.price }}</option>
{% endfor %}
</select>

<input type="datetime-local" name="time" required>

<button type="submit">Book Appointment</button>
</form>

</div>
</body>
</html>
